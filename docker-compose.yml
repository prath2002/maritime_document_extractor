services:
  postgres:
    image: postgres:16
    container_name: smde-postgres
    environment:
      POSTGRES_DB: smde
      POSTGRES_USER: smde
      POSTGRES_PASSWORD: smde
    ports:
      - "5432:5432"
    volumes:
      - smde-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smde -d smde"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  smde-postgres-data:
